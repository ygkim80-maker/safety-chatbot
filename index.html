<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>산업안전 AI 상담</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --primary: #1A6FDB;
    --primary-light: #EBF3FF;
    --primary-dark: #1458B8;
    --primary-mid: #2F7FEE;
    --accent: #F59E0B;
    --accent-light: #FFFBEB;
    --gray-50: #F9FAFB;
    --gray-100: #F3F4F6;
    --gray-200: #E5E7EB;
    --gray-400: #9CA3AF;
    --gray-600: #4B5563;
    --gray-800: #1F2937;
    --green: #10B981;
    --red: #EF4444;
    --radius: 16px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: #D8E4F0;
    display: flex; justify-content: center; align-items: flex-start;
    min-height: 100vh; padding: 20px 0;
  }
  .phone-wrap {
    width: 390px;
    height: 844px;
    background: var(--gray-50);
    border-radius: 44px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    overflow: hidden;
    position: relative;
    display: flex; flex-direction: column;
  }

  /* 상태바 */
  .status-bar {
    background: white;
    padding: 14px 28px 8px;
    display: flex; justify-content: space-between; align-items: center;
    flex-shrink: 0;
  }
  .status-bar .time { font-size: 15px; font-weight: 700; color: var(--gray-800); }
  .status-bar .icons { display: flex; gap: 6px; align-items: center; }

  /* 헤더 */
  .app-header {
    background: white;
    padding: 12px 20px 14px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--gray-100);
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, var(--primary), var(--primary-mid));
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .header-icon svg { width: 20px; height: 20px; }
  .header-title { font-size: 17px; font-weight: 800; color: var(--gray-800); }
  .header-sub { font-size: 11px; color: var(--gray-400); margin-top: 1px; }
  .settings-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--gray-100); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .settings-btn:active { background: var(--gray-200); }

  /* 설정 패널 */
  .settings-panel {
    background: white;
    border-bottom: 1px solid var(--gray-200);
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.3s ease, padding 0.3s ease;
    flex-shrink: 0;
  }
  .settings-panel.open { max-height: 160px; }
  .settings-inner { padding: 14px 20px 16px; }
  .settings-label {
    font-size: 12px; font-weight: 700; color: var(--gray-600);
    margin-bottom: 8px; display: flex; align-items: center; gap: 5px;
  }
  .settings-label svg { width: 14px; height: 14px; }
  .api-input-row { display: flex; gap: 8px; }
  .api-input {
    flex: 1; padding: 11px 14px; border: 1.5px solid var(--gray-200);
    border-radius: 12px; font-size: 13px; color: var(--gray-800);
    outline: none; transition: border-color 0.2s; background: white;
    font-family: inherit; letter-spacing: 0.02em;
  }
  .api-input:focus { border-color: var(--primary); }
  .api-input::placeholder { color: var(--gray-400); }
  .api-save-btn {
    padding: 11px 16px; background: var(--primary); color: white;
    border: none; border-radius: 12px; font-size: 13px; font-weight: 700;
    cursor: pointer; white-space: nowrap; transition: background 0.2s;
    font-family: inherit;
  }
  .api-save-btn:active { background: var(--primary-dark); }
  .api-status {
    font-size: 11px; margin-top: 6px;
    display: flex; align-items: center; gap: 4px;
  }
  .api-status.saved { color: var(--green); }
  .api-status.empty { color: var(--gray-400); }

  /* 채팅 영역 */
  .chat-area {
    flex: 1; overflow-y: auto; padding: 16px 16px 8px;
    display: flex; flex-direction: column; gap: 12px;
    scroll-behavior: smooth;
  }
  .chat-area::-webkit-scrollbar { display: none; }

  /* 웰컴 카드 */
  .welcome-card {
    background: linear-gradient(135deg, var(--primary) 0%, #2F7FEE 100%);
    border-radius: 20px; padding: 20px;
    color: white; text-align: center;
    margin-bottom: 4px;
  }
  .welcome-card .wc-emoji { font-size: 32px; margin-bottom: 8px; }
  .welcome-card .wc-title { font-size: 16px; font-weight: 800; margin-bottom: 6px; }
  .welcome-card .wc-sub { font-size: 12px; opacity: 0.85; line-height: 1.6; }

  /* 메시지 버블 */
  .msg-row {
    display: flex; align-items: flex-end; gap: 8px;
    animation: fadeInUp 0.25s ease;
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg-row.user { flex-direction: row-reverse; }
  .msg-row .msg-content { max-width: 76%; display: flex; flex-direction: column; }
  .msg-row.user .msg-content { align-items: flex-end; }
  .msg-row.assistant .msg-content { align-items: flex-start; }
  .msg-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--primary-mid));
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .msg-avatar svg { width: 16px; height: 16px; }
  .msg-bubble {
    display: inline-block;
    max-width: 100%;
    min-width: 52px;
    padding: 11px 14px;
    border-radius: 18px;
    font-size: 14px; line-height: 1.6;
    word-break: keep-all;
    overflow-wrap: break-word;
    white-space: pre-wrap;
  }
  .msg-row.assistant .msg-bubble {
    background: white;
    color: var(--gray-800);
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.07);
  }
  .msg-row.user .msg-bubble {
    background: var(--primary);
    color: white;
    border-bottom-right-radius: 4px;
  }
  .msg-time {
    font-size: 10px; color: var(--gray-400);
    margin-bottom: 2px; flex-shrink: 0;
  }
  .msg-row.user .msg-time { text-align: right; }

  /* 타이핑 인디케이터 */
  .typing-indicator {
    display: flex; align-items: flex-end; gap: 8px;
    animation: fadeInUp 0.25s ease;
  }
  .typing-bubble {
    background: white; border-radius: 18px; border-bottom-left-radius: 4px;
    padding: 12px 16px; box-shadow: 0 1px 6px rgba(0,0,0,0.07);
    display: flex; align-items: center; gap: 5px;
  }
  .typing-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--gray-400);
    animation: bounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  /* 에러 메시지 */
  .error-toast {
    background: #FEF2F2; border: 1px solid #FCA5A5; border-radius: 12px;
    padding: 10px 14px; font-size: 13px; color: var(--red);
    display: flex; align-items: flex-start; gap: 8px;
    animation: fadeInUp 0.25s ease;
  }
  .error-toast svg { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; }

  /* 퀵 액션 칩 */
  .quick-actions {
    padding: 8px 0 6px;
    flex-shrink: 0;
    background: white;
    border-top: 1px solid var(--gray-100);
  }
  .quick-actions-scroll {
    display: flex; gap: 8px;
    overflow-x: auto; padding: 0 16px;
    scrollbar-width: none;
  }
  .quick-actions-scroll::-webkit-scrollbar { display: none; }
  .chip {
    display: flex; align-items: center; gap: 5px;
    background: var(--primary-light); color: var(--primary);
    border: 1.5px solid #C5DDFF; border-radius: 20px;
    padding: 7px 13px; font-size: 12px; font-weight: 600;
    white-space: nowrap; cursor: pointer;
    transition: all 0.15s; font-family: inherit;
    flex-shrink: 0;
  }
  .chip:active { background: var(--primary); color: white; border-color: var(--primary); }
  .chip svg { width: 13px; height: 13px; flex-shrink: 0; }

  /* 입력 영역 */
  .input-area {
    background: white;
    padding: 10px 16px 20px;
    border-top: 1px solid var(--gray-100);
    flex-shrink: 0;
  }
  .input-row {
    display: flex; align-items: flex-end; gap: 10px;
    background: var(--gray-50); border-radius: 24px;
    border: 1.5px solid var(--gray-200);
    padding: 6px 6px 6px 16px;
    transition: border-color 0.2s;
  }
  .input-row:focus-within { border-color: var(--primary); }
  .msg-input {
    flex: 1; border: none; background: transparent;
    font-size: 15px; color: var(--gray-800);
    outline: none; resize: none;
    max-height: 100px; min-height: 24px; line-height: 1.5;
    font-family: inherit;
    scrollbar-width: none;
  }
  .msg-input::-webkit-scrollbar { display: none; }
  .msg-input::placeholder { color: var(--gray-400); }
  .send-btn {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--primary); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
  }
  .send-btn:disabled { background: var(--gray-200); cursor: not-allowed; }
  .send-btn:not(:disabled):active { background: var(--primary-dark); transform: scale(0.95); }
  .send-btn svg { width: 18px; height: 18px; }

  /* 마크다운 스타일 (AI 응답) */
  .msg-bubble strong { font-weight: 700; }
  .msg-bubble em { font-style: italic; }
  .msg-bubble ol, .msg-bubble ul {
    padding-left: 18px; margin: 6px 0;
  }
  .msg-bubble li { margin-bottom: 3px; }
  .msg-bubble p { margin-bottom: 6px; }
  .msg-bubble p:last-child { margin-bottom: 0; }
  .msg-bubble h3, .msg-bubble h4 {
    font-weight: 700; margin: 8px 0 4px;
  }
  .msg-bubble code {
    background: var(--gray-100); padding: 1px 5px;
    border-radius: 4px; font-size: 12px;
  }
  .msg-bubble hr {
    border: none; border-top: 1px solid var(--gray-200);
    margin: 8px 0;
  }

  /* 날짜 구분선 */
  .date-divider {
    display: flex; align-items: center; gap: 10px;
    font-size: 11px; color: var(--gray-400);
  }
  .date-divider::before, .date-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--gray-200);
  }
</style>
</head>
<body>
<div class="phone-wrap">

  <!-- 상태바 -->
  <div class="status-bar">
    <span class="time" id="statusTime">9:41</span>
    <div class="icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
        <rect x="0" y="3" width="3" height="9" rx="1" fill="#1F2937"/>
        <rect x="4.5" y="2" width="3" height="10" rx="1" fill="#1F2937"/>
        <rect x="9" y="0.5" width="3" height="11.5" rx="1" fill="#1F2937"/>
        <rect x="13.5" y="0.5" width="3" height="11.5" rx="1" fill="#E5E7EB"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="#1F2937">
        <path d="M8 2.4C10.6 2.4 12.9 3.5 14.5 5.3L16 3.8C14 1.5 11.2 0 8 0C4.8 0 2 1.5 0 3.8L1.5 5.3C3.1 3.5 5.4 2.4 8 2.4Z"/>
        <path d="M8 5.6C9.8 5.6 11.4 6.4 12.5 7.6L14 6.1C12.5 4.6 10.4 3.7 8 3.7C5.6 3.7 3.5 4.6 2 6.1L3.5 7.6C4.6 6.4 6.2 5.6 8 5.6Z"/>
        <circle cx="8" cy="11" r="1.5"/>
      </svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
        <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="#1F2937" stroke-opacity="0.35"/>
        <rect x="2" y="2" width="16" height="8" rx="2" fill="#1F2937"/>
        <path d="M23 4.5V7.5C23.8 7.2 24.5 6.5 24.5 6C24.5 5.5 23.8 4.8 23 4.5Z" fill="#1F2937" fill-opacity="0.4"/>
      </svg>
    </div>
  </div>

  <!-- 앱 헤더 -->
  <div class="app-header">
    <div class="header-left">
      <div class="header-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <div>
        <div class="header-title">산업안전 AI 상담</div>
        <div class="header-sub">산업안전보건 전문 상담 서비스</div>
      </div>
    </div>
    <button class="settings-btn" onclick="toggleSettings()" title="API 키 설정">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4B5563" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <!-- 설정 패널 -->
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-inner">
      <div class="settings-label">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        Gemini API 키
      </div>
      <div class="api-input-row">
        <input type="password" class="api-input" id="apiKeyInput"
          placeholder="AIzaSy..." autocomplete="off" spellcheck="false"/>
        <button class="api-save-btn" onclick="saveApiKey()">저장</button>
      </div>
      <div class="api-status empty" id="apiStatus">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        API 키를 입력하면 AI와 대화할 수 있습니다
      </div>
    </div>
  </div>

  <!-- 채팅 영역 -->
  <div class="chat-area" id="chatArea">
    <div class="welcome-card">
      <div class="wc-emoji">🦺</div>
      <div class="wc-title">산업안전보건 AI 상담사</div>
      <div class="wc-sub">산업안전보건법, 산업재해, 위험성 평가,<br>안전교육 등 무엇이든 물어보세요</div>
    </div>
    <div class="date-divider">오늘</div>
  </div>

  <!-- 퀵 액션 -->
  <div class="quick-actions">
    <div class="quick-actions-scroll" id="quickActions">
      <button class="chip" onclick="sendQuick('산업안전보건법 위반 시 처벌은?')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>

        추락재해 발생 시 조치사항
      </button>
      <button class="chip" onclick="sendQuick('위험성 평가 작성 방법')">

        </svg>
        위험성 평가 작성 방법

          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        안전관리자 선임 기준

      <button class="chip" onclick="sendQuick('근로자 안전교육 시간 기준')">

      <textarea class="msg-input" id="msgInput" placeholder="산업안전 관련 질문을 입력하세요..."
        rows="1" onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
        <svg viewBox="0 0 24 24" fill="white">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>

</div>

<script>
// ─── 상태 ────────────────────────────────────────────────────────────
const SYSTEM_PROMPT = `당신은 산업안전보건 전문 상담사입니다. 산업안전보건법, 산업안전보건기준에관한규칙, 위험물안전관리법 등 관련 법령에 대한 전문 지식을 갖추고 있습니다.

주요 역할:
1. 산업안전보건 관련 법령/규정 질문에 정확하고 친절하게 답변
2. 산업재해 발생 시 대응 조치 안내
3. 위험성 평가 작성 도움
4. 안전보건 교육, 관리체계 구축 안내

답변 스타일:
- 한국어로 답변
- 명확하고 실용적인 정보 제공
- 관련 법령 조항 인용 (예: 산업안전보건법 제○조)
- 복잡한 내용은 번호 목록으로 정리
- 전문적이지만 이해하기 쉬운 언어 사용

주의: 법적 효력이 있는 공식 법률 자문이 아님을 항상 명심하고, 중요한 사안은 전문 기관(고용노동부, 안전보건공단)에 확인을 권장하세요.`;

let conversationHistory = [];
let isLoading = false;

// ─── 초기화 ──────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  updateClock();
  setInterval(updateClock, 1000);

  const saved = localStorage.getItem('safety_api_key');
  if (saved) {
    document.getElementById('apiKeyInput').value = saved;
    updateApiStatus(true);
  }

  document.getElementById('msgInput').addEventListener('input', () => {
    const val = document.getElementById('msgInput').value.trim();
    document.getElementById('sendBtn').disabled = val.length === 0 || isLoading;
  });
});

function updateClock() {
  const now = new Date();
  const h = now.getHours().toString().padStart(2, '0');
  const m = now.getMinutes().toString().padStart(2, '0');
  document.getElementById('statusTime').textContent = `${h}:${m}`;
}

// ─── 설정 ────────────────────────────────────────────────────────────
function toggleSettings() {
  const panel = document.getElementById('settingsPanel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) {
    setTimeout(() => document.getElementById('apiKeyInput').focus(), 320);
  }
}

function saveApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key) {
    updateApiStatus(false);
    return;
  }
  localStorage.setItem('safety_api_key', key);
  updateApiStatus(true);
  const panel = document.getElementById('settingsPanel');
  setTimeout(() => panel.classList.remove('open'), 500);
}

function updateApiStatus(saved) {
  const el = document.getElementById('apiStatus');
  if (saved) {
    el.className = 'api-status saved';
    el.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> API 키가 저장되었습니다`;
  } else {
    el.className = 'api-status empty';
    el.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Google AI Studio에서 발급한 Gemini API 키를 입력하세요`;
  }
}

// ─── 입력 UI ──────────────────────────────────────────────────────────
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function handleKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!document.getElementById('sendBtn').disabled) sendMessage();
  }
}

function sendQuick(text) {
  if (isLoading) return;
  document.getElementById('msgInput').value = text;
  autoResize(document.getElementById('msgInput'));
  sendMessage();
}

// ─── 메시지 렌더링 ────────────────────────────────────────────────────
function getTimeStr() {
  const now = new Date();
  const h = now.getHours();
  const m = now.getMinutes().toString().padStart(2, '0');
  const ampm = h < 12 ? '오전' : '오후';
  const h12 = h % 12 || 12;
  return `${ampm} ${h12}:${m}`;
}

function renderMarkdown(text) {
  return text
    // bold
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    // italic
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    // inline code
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    // hr
    .replace(/^---$/gm, '<hr>')
    // headings
    .replace(/^#### (.+)$/gm, '<h4>$1</h4>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    // ordered list
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>(\n|$))+/g, m => `<ol>${m}</ol>`)
    // unordered list
    .replace(/^[-•] (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>(\n|$))+/g, m => {
      if (m.includes('<ol>')) return m;
      return `<ul>${m}</ul>`;
    })
    // paragraphs
    .replace(/\n\n+/g, '</p><p>')
    .replace(/^(.+)$/, '<p>$1</p>');
}

function appendMessage(role, text) {
  const area = document.getElementById('chatArea');
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  if (role === 'assistant') {
    row.innerHTML = `
      <div class="msg-avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <div class="msg-content">
        <div class="msg-bubble">${renderMarkdown(text)}</div>
        <div class="msg-time">${getTimeStr()}</div>
      </div>`;
  } else {
    row.innerHTML = `
      <div class="msg-content">
        <div class="msg-bubble">${escapeHtml(text)}</div>
        <div class="msg-time">${getTimeStr()}</div>
      </div>`;
  }

  area.appendChild(row);
  scrollToBottom();
  return row;
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function showTyping() {
  const area = document.getElementById('chatArea');
  const el = document.createElement('div');
  el.className = 'typing-indicator';
  el.id = 'typingIndicator';
  el.innerHTML = `
    <div class="msg-avatar">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
    </div>
    <div class="typing-bubble">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>`;
  area.appendChild(el);
  scrollToBottom();
}

function hideTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function showError(msg) {
  const area = document.getElementById('chatArea');
  const el = document.createElement('div');
  el.className = 'error-toast';
  el.innerHTML = `
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="12"/>
      <line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <span>${escapeHtml(msg)}</span>`;
  area.appendChild(el);
  scrollToBottom();
  setTimeout(() => el.remove(), 6000);
}

function scrollToBottom() {
  const area = document.getElementById('chatArea');
  setTimeout(() => area.scrollTop = area.scrollHeight, 50);
}

// ─── API 호출 ─────────────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || isLoading) return;

  const apiKey = localStorage.getItem('safety_api_key') || document.getElementById('apiKeyInput').value.trim();
  if (!apiKey) {
    document.getElementById('settingsPanel').classList.add('open');
    showError('API 키를 먼저 입력해 주세요. 상단 설정 버튼을 눌러 입력하세요.');
    return;
  }

  // 입력 초기화
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;
  isLoading = true;

  // 사용자 메시지 추가
  appendMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  // 타이핑 표시
  showTyping();

  try {
    // Gemini API 형식으로 대화 이력 변환
    const geminiContents = conversationHistory.map(m => ({
      role: m.role === 'assistant' ? 'model' : 'user',
      parts: [{ text: m.content }]
    }));

    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
          contents: geminiContents,
          generationConfig: { maxOutputTokens: 1500, temperature: 0.7 }
        })
      }
    );

    hideTyping();

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      const msg = err?.error?.message || `오류가 발생했습니다 (HTTP ${response.status})`;
      if (response.status === 400) {
        showError('API 키가 올바르지 않습니다. 설정에서 다시 확인해 주세요.');
      } else if (response.status === 429) {
        showError('요청이 너무 많습니다. 잠시 후 다시 시도해 주세요.');
      } else {
        showError(`오류 ${response.status}: ${msg}`);
      }
      conversationHistory.pop();
    } else {
      const data = await response.json();
      const reply = data?.candidates?.[0]?.content?.parts?.[0]?.text || '응답을 받지 못했습니다.';
      appendMessage('assistant', reply);
      conversationHistory.push({ role: 'assistant', content: reply });
    }
  } catch (e) {
    hideTyping();
    if (e.name === 'TypeError' && e.message.includes('fetch')) {
      showError('네트워크 오류가 발생했습니다. 인터넷 연결을 확인해 주세요.');
    } else {
      showError('오류가 발생했습니다: ' + e.message);
    }
    conversationHistory.pop();
  } finally {
    isLoading = false;
    const cur = document.getElementById('msgInput').value.trim();
    document.getElementById('sendBtn').disabled = cur.length === 0;
  }
}
</script>
