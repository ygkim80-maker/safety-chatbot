<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>산업안전 AI 상담</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: #f0f2f5; height: 100dvh; display: flex; flex-direction: column; }

  /* 헤더 */
  .header { background: #1a73e8; color: #fff; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 6px rgba(0,0,0,.2); flex-shrink: 0; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-icon { width: 36px; height: 36px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .header h1 { font-size: 17px; font-weight: 700; }
  .header p { font-size: 11px; opacity: .8; margin-top: 2px; }
  .btn-setting { background: none; border: none; color: #fff; font-size: 22px; cursor: pointer; padding: 4px; }

  /* 설정 패널 */
  .settings-panel { display: none; background: #fff; border-bottom: 1px solid #ddd; padding: 14px 16px; flex-shrink: 0; }
  .settings-panel.open { display: block; }
  .settings-panel label { font-size: 13px; color: #555; display: block; margin-bottom: 6px; }
  .settings-panel input { width: 100%; padding: 9px 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 13px; }
  .settings-panel .btn-save { margin-top: 10px; background: #1a73e8; color: #fff; border: none; border-radius: 8px; padding: 9px 20px; font-size: 13px; cursor: pointer; }
  .settings-panel .btn-save:hover { background: #1558b0; }
  .api-status { font-size: 12px; margin-top: 6px; }
  .api-status.ok { color: #0a0; }
  .api-status.err { color: #c00; }

  /* 채팅 영역 */
  .chat-area { flex: 1; overflow-y: auto; padding: 16px 12px; display: flex; flex-direction: column; gap: 12px; }

  /* 메시지 행 */
  .msg-row { display: flex; align-items: flex-end; gap: 8px; }
  .msg-row.user { flex-direction: row-reverse; }
  .msg-row .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .msg-row.assistant .avatar { background: #1a73e8; }
  .msg-row.user .avatar { background: #e8f0fe; }
  .msg-row .msg-content { max-width: 76%; display: flex; flex-direction: column; }
  .msg-row.user .msg-content { align-items: flex-end; }
  .msg-row.assistant .msg-content { align-items: flex-start; }
  .msg-bubble {
    display: inline-block;
    max-width: 100%;
    min-width: 52px;
    padding: 11px 14px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.6;
    word-break: keep-all;
    overflow-wrap: break-word;
    white-space: pre-wrap;
  }
  .msg-row.assistant .msg-bubble { background: #fff; border: 1px solid #e0e0e0; border-bottom-left-radius: 4px; color: #222; }
  .msg-row.user .msg-bubble { background: #1a73e8; color: #fff; border-bottom-right-radius: 4px; }
  .msg-time { font-size: 10px; color: #aaa; margin-top: 3px; }

  /* 입력 영역 */
  .input-area { background: #fff; border-top: 1px solid #e0e0e0; padding: 10px 12px; display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0; }
  .input-area textarea { flex: 1; border: 1px solid #ccc; border-radius: 20px; padding: 10px 14px; font-size: 14px; resize: none; max-height: 120px; outline: none; font-family: inherit; line-height: 1.5; }
  .input-area textarea:focus { border-color: #1a73e8; }
  .btn-send { width: 42px; height: 42px; background: #1a73e8; border: none; border-radius: 50%; color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .btn-send:disabled { background: #bbb; cursor: not-allowed; }

  /* 빠른 질문 */
  .quick-btns { display: flex; gap: 8px; flex-wrap: wrap; padding: 0 12px 10px; flex-shrink: 0; }
  .quick-btn { background: #e8f0fe; color: #1a73e8; border: none; border-radius: 16px; padding: 7px 13px; font-size: 12px; cursor: pointer; white-space: nowrap; }
  .quick-btn:hover { background: #d2e3fc; }

  /* 타이핑 인디케이터 */
  .typing { display: flex; gap: 4px; padding: 12px 14px; }
  .typing span { width: 7px; height: 7px; background: #aaa; border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

  /* 재시도 메시지 */
  .retry-msg { font-size: 12px; color: #888; text-align: center; padding: 6px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-icon">⛑️</div>
    <div>
      <h1>산업안전 AI 상담</h1>
      <p>산업안전보건법 · 위험성 평가 · 사고 대응</p>
    </div>
  </div>
  <button class="btn-setting" id="btnSetting" title="설정">⚙️</button>
</div>

<div class="settings-panel" id="settingsPanel">
  <label>Gemini API 키</label>
  <input type="password" id="apiKeyInput" placeholder="AIzaSy...">
  <div class="api-status" id="apiStatus"></div>
  <button class="btn-save" id="btnSave">저장</button>
</div>

<div class="chat-area" id="chatArea"></div>

<div class="quick-btns">
  <button class="quick-btn" onclick="sendQuick('안전관리자 선임 기준이 뭔가요?')">안전관리자 선임</button>
  <button class="quick-btn" onclick="sendQuick('위험성 평가 절차를 알려주세요')">위험성 평가</button>
  <button class="quick-btn" onclick="sendQuick('추락사고 발생 시 대처 방법')">추락사고 대응</button>
  <button class="quick-btn" onclick="sendQuick('산업안전기사 시험 과목이 뭔가요?')">시험 과목</button>
</div>

<div class="input-area">
  <textarea id="msgInput" placeholder="산업안전 관련 질문을 입력하세요..." rows="1"></textarea>
  <button class="btn-send" id="btnSend">➤</button>
</div>

<script>
const SYSTEM_PROMPT = `당신은 산업안전보건 전문 AI 상담사입니다.

전문 분야:
- 산업안전보건법 및 관련 법령 해석
- 위험성 평가 방법 및 절차
- 사고 유형별 원인 분석 및 대응 방법
- 안전관리 체계 구축 및 운영
- 산업안전기사/산업기사 시험 관련 정보
- 작업환경 개선 및 안전 교육

답변 원칙:
1. 정확하고 실용적인 정보를 제공합니다
2. 법령 기준은 최신 산업안전보건법 기준으로 안내합니다
3. 필요시 관련 법조항을 인용합니다
4. 위험 상황은 신속하고 명확하게 안내합니다
5. 친절하고 이해하기 쉬운 언어로 설명합니다

중요: 실제 긴급 상황에서는 반드시 전문가(안전관리자, 119 등)에게 즉시 연락하도록 안내하세요.`;

let conversationHistory = [];
let isLoading = false;
let apiKey = localStorage.getItem('gemini_api_key') || '';

// 초기화
window.onload = () => {
  if (apiKey) {
    document.getElementById('apiKeyInput').value = apiKey;
    document.getElementById('apiStatus').textContent = 'API 키 저장됨 ✓';
    document.getElementById('apiStatus').className = 'api-status ok';
  }
  addWelcomeMessage();
  autoResizeTextarea();
};

function addWelcomeMessage() {
  addMessage('assistant', `안녕하세요! 산업안전 AI 상담사입니다. 😊\n\n산업안전보건법, 위험성 평가, 사고 대응, 안전관리 등 산업안전 관련 궁금한 사항을 질문해 주세요.\n\n⚠️ 실제 긴급상황은 119 또는 안전관리자에게 즉시 연락하세요.`);
}

function autoResizeTextarea() {
  const ta = document.getElementById('msgInput');
  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
  });
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
}

document.getElementById('btnSetting').onclick = () => {
  document.getElementById('settingsPanel').classList.toggle('open');
};

document.getElementById('btnSave').onclick = () => {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key) { alert('API 키를 입력해주세요.'); return; }
  apiKey = key;
  localStorage.setItem('gemini_api_key', key);
  document.getElementById('apiStatus').textContent = 'API 키 저장됨 ✓';
  document.getElementById('apiStatus').className = 'api-status ok';
  document.getElementById('settingsPanel').classList.remove('open');
};

document.getElementById('btnSend').onclick = sendMessage;

function sendQuick(text) {
  document.getElementById('msgInput').value = text;
  sendMessage();
}

function addMessage(role, text) {
  const chatArea = document.getElementById('chatArea');
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'assistant' ? '⛑️' : '👤';

  const content = document.createElement('div');
  content.className = 'msg-content';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;

  const time = document.createElement('div');
  time.className = 'msg-time';
  const now = new Date();
  time.textContent = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;

  content.appendChild(bubble);
  content.appendChild(time);
  row.appendChild(avatar);
  row.appendChild(content);
  chatArea.appendChild(row);
  chatArea.scrollTop = chatArea.scrollHeight;
  return bubble;
}

function showTyping() {
  const chatArea = document.getElementById('chatArea');
  const row = document.createElement('div');
  row.className = 'msg-row assistant';
  row.id = 'typingRow';

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = '⛑️';

  const content = document.createElement('div');
  content.className = 'msg-content';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.style.padding = '8px 14px';

  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.innerHTML = '<span></span><span></span><span></span>';

  bubble.appendChild(typing);
  content.appendChild(bubble);
  row.appendChild(avatar);
  row.appendChild(content);
  chatArea.appendChild(row);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function hideTyping() {
  const row = document.getElementById('typingRow');
  if (row) row.remove();
}

function showRetryMessage(sec) {
  hideTyping();
  const chatArea = document.getElementById('chatArea');
  let retryEl = document.getElementById('retryMsg');
  if (!retryEl) {
    retryEl = document.createElement('div');
    retryEl.id = 'retryMsg';
    retryEl.className = 'retry-msg';
    chatArea.appendChild(retryEl);
  }
  retryEl.textContent = `⏳ 요청이 많아 ${sec}초 후 자동 재시도합니다...`;
  chatArea.scrollTop = chatArea.scrollHeight;
}

function hideRetryMessage() {
  const el = document.getElementById('retryMsg');
  if (el) el.remove();
}

async function callGeminiWithRetry(contents, maxRetries = 3) {
  const delays = [5, 10, 20]; // 재시도 대기 시간(초)

  for (let attempt = 0; attempt <= maxRetries; attempt++) {
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
          contents: contents,
          generationConfig: { maxOutputTokens: 1500, temperature: 0.7 }
        })
      }
    );

    if (response.ok) {
      hideRetryMessage();
      return await response.json();
    }

    if (response.status === 429 && attempt < maxRetries) {
      const waitSec = delays[attempt];
      showRetryMessage(waitSec);

      // 카운트다운
      for (let s = waitSec; s > 0; s--) {
        showRetryMessage(s);
        await new Promise(r => setTimeout(r, 1000));
      }
      showTyping();
      continue;
    }

    // 다른 에러
    const errData = await response.json().catch(() => ({}));
    throw new Error(errData?.error?.message || `HTTP ${response.status}`);
  }

  throw new Error('재시도 횟수를 초과했습니다. 잠시 후 다시 시도해주세요.');
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || isLoading) return;

  if (!apiKey) {
    document.getElementById('settingsPanel').classList.add('open');
    alert('먼저 API 키를 입력해주세요.');
    return;
  }

  isLoading = true;
  document.getElementById('btnSend').disabled = true;
  input.value = '';
  input.style.height = 'auto';

  addMessage('user', text);
  conversationHistory.push({ role: 'user', parts: [{ text }] });

  showTyping();

  try {
    const data = await callGeminiWithRetry(conversationHistory);
    hideTyping();
    hideRetryMessage();

    const reply = data?.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!reply) throw new Error('응답을 받지 못했습니다.');

    addMessage('assistant', reply);
    conversationHistory.push({ role: 'model', parts: [{ text: reply }] });

    // 대화 20턴 이상이면 앞부분 제거 (메모리 절약)
    if (conversationHistory.length > 40) {
      conversationHistory = conversationHistory.slice(-30);
    }

  } catch (err) {
    hideTyping();
    hideRetryMessage();
    addMessage('assistant', `오류가 발생했습니다: ${err.message}\n\nAPI 키를 확인하거나 잠시 후 다시 시도해주세요.`);
  }

  isLoading = false;
  document.getElementById('btnSend').disabled = false;
  input.focus();
}
</script>
</body>
</html>
